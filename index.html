<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>慎一郎の simsfreeplay 日記</title>
  <meta name="description" content="シムズフリープレイのアップデートを、自分のプレイ結果で詳しく記録するサイト。">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="#" id="home-link" class="site-title">慎一郎の simsfreeplay 日記</a>
      <p id="site-tagline" class="site-tagline"></p>
    </div>
  </header>

  <main class="site-main">
    <section id="list-view" class="view">
      <h1 class="visually-hidden">記事一覧</h1>
      <div id="article-list" class="article-list"></div>
      <p id="empty-message" class="empty-message hidden">まだ記事がありません。</p>
    </section>

    <article id="detail-view" class="view hidden">
      <div class="back-link-sentinel" aria-hidden="true"></div>
      <a href="#" id="back-link" class="back-link">← 一覧に戻る</a>
      <div id="article-detail"></div>
    </article>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="footer-year"></span> <span id="footer-name">慎一郎</span></p>
  </footer>

  <script src="updates.js"></script>
  <script src="common.js"></script>
  <script src="public-store.js"></script>
  <script src="app.js"></script>
</body>
</html>
